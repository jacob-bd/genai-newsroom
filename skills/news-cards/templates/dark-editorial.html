<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; min-height: 720px; background: #0a0a0f; }
.card {
  width: 1280px; min-height: 720px;
  position: relative;
  background: linear-gradient(160deg, #0a0a0f 0%, #1a0a2e 40%, #0f0f1a 100%);
  display: flex; flex-direction: column; justify-content: center;
  padding: 44px 70px;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}
.accent-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 7px;
  background: linear-gradient(90deg, #F000E7, #0CD9EA);
}
.category {
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #0CD9EA;
  margin-bottom: 16px;
}
.headline {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 96px;
  text-transform: uppercase;
  line-height: 0.92;
  color: #ffffff;
  margin-bottom: 22px;
  max-width: 1180px;
  overflow-wrap: break-word;
  word-break: break-word;
}
.headline .highlight { color: #F000E7; }
.subline {
  font-size: 52px;
  font-weight: 400;
  color: oklch(0.85 0.01 260);
  line-height: 1.35;
  max-width: 1180px;
}
.glow {
  position: absolute;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, oklch(0.4 0.2 320 / 0.18), transparent 70%);
  top: 50%; left: -120px;
  transform: translateY(-50%);
}
.glow2 {
  position: absolute;
  width: 250px; height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, oklch(0.35 0.15 200 / 0.12), transparent 70%);
  bottom: 30px; right: 180px;
}
.tg-cta {
  position: absolute;
  bottom: 22px;
  right: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.65;
}
.tg-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #29a8e0;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tg-icon svg { width: 16px; height: 16px; }
.tg-handle {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: oklch(0.72 0.01 260);
}
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="category">{{CATEGORY}}</div>
  <div class="headline">{{HEADLINE}}</div>
  <div class="subline">{{SUBLINE}}</div>
  <div class="tg-cta">
    <div class="tg-icon">
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
    </div>
    <div class="tg-handle">t.me/genaispot</div>
  </div>
</div>
</body>
</html>
