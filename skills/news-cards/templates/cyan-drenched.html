<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; }
.card {
  width: 1280px; height: 720px;
  position: relative;
  background: #0CD9EA;
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
}
.header {
  padding: 36px 70px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.tag {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #0a0a0f;
  background: oklch(0.1 0.01 200 / 0.15);
  padding: 8px 22px;
  border-radius: 2px;
}
.logo-mark {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 36px;
  color: oklch(0.1 0.05 200);
  letter-spacing: 0.05em;
}
.body {
  padding: 0 70px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
}
.headline {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 120px;
  line-height: 0.92;
  color: #0a0a0f;
  max-width: 1100px;
  text-transform: uppercase;
}
.divider {
  width: 100px;
  height: 5px;
  background: oklch(0.1 0.05 200 / 0.25);
}
.subline {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-weight: 400;
  font-size: 44px;
  line-height: 1.35;
  color: oklch(0.15 0.05 200);
  max-width: 950px;
}
.footer {
  padding: 0 70px 32px;
  display: flex;
  justify-content: flex-start;
  align-items: flex-end;
}
.source-info {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: oklch(0.15 0.05 200 / 0.5);
}
.tg-cta {
  position: absolute;
  bottom: 18px;
  right: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.7;
}
.tg-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #29a8e0;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tg-icon svg { width: 16px; height: 16px; }
.tg-handle {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: oklch(0.15 0.05 200 / 0.65);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="tag">{{CATEGORY}}</div>
    <div class="logo-mark">GEN AI SPOTLIGHT</div>
  </div>
  <div class="body">
    <div class="headline">{{HEADLINE}}</div>
    <div class="divider"></div>
    <div class="subline">{{SUBLINE}}</div>
  </div>
  <div class="footer">
    <div class="source-info">{{DATE}}</div>
  </div>
  <div class="tg-cta">
    <div class="tg-icon">
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
    </div>
    <div class="tg-handle">t.me/genaispot</div>
  </div>
</div>
</body>
</html>
