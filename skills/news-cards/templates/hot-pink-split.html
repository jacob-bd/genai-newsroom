<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; }
.card {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.top-block {
  flex: 1;
  background: #F000E7;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 70px;
  position: relative;
}
.top-block::after {
  content: '';
  position: absolute;
  bottom: 0; left: 70px; right: 70px;
  height: 2px;
  background: oklch(0.3 0.15 330 / 0.3);
}
.headline {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 126px;
  line-height: 1.05;
  color: #ffffff;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}
.bottom-block {
  height: 360px;
  background: #0a0a0f;
  padding: 36px 70px 44px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
}
.meta-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.stat-block {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-label {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-weight: 600;
  font-size: 20px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: oklch(0.72 0.01 260);
}
.stat-value {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-weight: 600;
  font-size: 52px;
  color: #0CD9EA;
}
.context {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 38px;
  line-height: 1.4;
  color: oklch(0.82 0.01 260);
  max-width: 1000px;
}
.tg-cta {
  position: absolute;
  bottom: 18px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.6;
}
.tg-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #29a8e0;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tg-icon svg { width: 16px; height: 16px; }
.tg-handle {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: oklch(0.72 0.01 260);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}
</style>
</head>
<body>
<div class="card">
  <div class="top-block">
    <div class="headline">{{HEADLINE}}</div>
  </div>
  <div class="bottom-block">
    <div class="meta-row">
      <div class="stat-block">
        <div class="stat-label">{{STAT_LABEL_1}}</div>
        <div class="stat-value">{{STAT_VALUE_1}}</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">{{STAT_LABEL_2}}</div>
        <div class="stat-value">{{STAT_VALUE_2}}</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">{{STAT_LABEL_3}}</div>
        <div class="stat-value">{{STAT_VALUE_3}}</div>
      </div>
    </div>
    <div class="context">{{SUBLINE}}</div>
    <div class="tg-cta">
      <div class="tg-icon">
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
        </svg>
      </div>
      <div class="tg-handle">t.me/genaispot</div>
    </div>
  </div>
</div>
</body>
</html>
